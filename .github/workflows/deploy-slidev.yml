# Rebuild Slidev presentation and commit to repo so GitHub Pages serves it at /demotion/
name: Deploy Slidev to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'slidev/demotion/**'
      - '!slidev/demotion/dist/**'
      - '!.github/**'

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
          cache-dependency-path: slidev/demotion/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: slidev/demotion
        run: pnpm install --frozen-lockfile

      - name: Build for GitHub Pages
        working-directory: slidev/demotion
        run: pnpm run build:gh

      - name: Commit and push demotion output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add demotion/
          git diff --staged --quiet || git commit -m "chore: rebuild Slidev presentation (demotion)"
          git push
